<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders — SubStore</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo">
        <div class="logo-icon">S</div>
        SubStore
      </a>
      <nav class="nav" id="mainNav">
        <a href="/" class="nav-link">Store</a>
        <a href="/cart.html" class="nav-link cart-link">
          Cart <span class="cart-badge" id="cartBadge"></span>
        </a>
        <a href="/orders.html" class="nav-link active" id="ordersLink">My Orders</a>
        <a href="/login.html" class="nav-link btn btn-primary btn-sm" id="authBtn">Sign In</a>
      </nav>
    </div>
  </header>

  <div class="container">
    <div class="page-header">
      <h1>My Orders</h1>
    </div>

    <div id="ordersContent">
      <div class="spinner"></div>
    </div>
  </div>

  <footer class="footer">
    <p>&copy; 2026 SubStore. All rights reserved.</p>
  </footer>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/chat-widget.js"></script>
  <script>
    async function loadOrders() {
      const container = document.getElementById('ordersContent');

      if (!Auth.isLoggedIn()) {
        container.innerHTML = `
          <div class="empty-cart">
            <div class="icon">🔒</div>
            <h2>Please sign in</h2>
            <p>You need to be signed in to view your orders.</p>
            <a href="/login.html" class="btn btn-primary mt-4">Sign In</a>
          </div>
        `;
        return;
      }

      try {
        const res = await fetch('/api/orders', {
          headers: { 'Authorization': `Bearer ${Auth.getToken()}` }
        });

        if (res.status === 401) {
          Auth.logout();
          window.location.href = '/login.html';
          return;
        }

        const orders = await res.json();

        if (orders.length === 0) {
          container.innerHTML = `
            <div class="empty-cart">
              <div class="icon">📦</div>
              <h2>No orders yet</h2>
              <p>Your order history will appear here after your first purchase.</p>
              <a href="/" class="btn btn-primary mt-4">Browse Products</a>
            </div>
          `;
          return;
        }

        container.innerHTML = orders.map(order => {
          const itemsHtml = order.items.map(item => `
            <div class="order-item-row">
              <span>${item.product_name} × ${item.quantity}</span>
              <span>$${(item.price * item.quantity).toFixed(2)}</span>
            </div>
          `).join('');

          const date = new Date(order.created_at + 'Z').toLocaleDateString('en-US', {
            year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
          });

          return `
            <div class="order-card">
              <div class="order-header">
                <div>
                  <span class="order-id">Order #${order.id}</span>
                  <span class="order-date"> — ${date}</span>
                </div>
                <span class="status-badge ${order.status}">${order.status}</span>
              </div>
              <div class="order-items-list">
                ${itemsHtml}
                <div class="order-total-row">
                  <span>Total</span>
                  <span>$${order.total.toFixed(2)}</span>
                </div>
              </div>
              <div style="margin-top:12px; font-size:0.8rem; color:var(--dark-light);">
                Payment: ${order.payment_method} | Ref: ${order.payment_ref}
              </div>
            </div>
          `;
        }).join('');
      } catch (e) {
        container.innerHTML = '<p class="text-center">Failed to load orders.</p>';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadOrders();
      updateCartBadge();
      updateAuthUI();
    });
  </script>
</body>
</html>
