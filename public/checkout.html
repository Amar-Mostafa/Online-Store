<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — SubStore</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo">
        <div class="logo-icon">S</div>
        SubStore
      </a>
      <nav class="nav">
        <a href="/" class="nav-link">Store</a>
        <a href="/cart.html" class="nav-link cart-link">
          Cart <span class="cart-badge" id="cartBadge"></span>
        </a>
      </nav>
    </div>
  </header>

  <div class="container">
    <div class="page-header">
      <h1>Checkout</h1>
    </div>

    <div id="checkoutContent">
      <div class="checkout-layout">
        <!-- Payment Form -->
        <div>
          <div class="checkout-section">
            <h2>💳 Payment Method</h2>
            <div class="payment-methods">
              <label class="payment-method selected" onclick="selectPayment(this, 'card')">
                <input type="radio" name="payment" value="card" checked>
                <div class="payment-radio"></div>
                <div class="payment-method-info">
                  <h4>Credit / Debit Card</h4>
                  <p>Visa, Mastercard, AMEX</p>
                </div>
              </label>
              <label class="payment-method" onclick="selectPayment(this, 'paypal')">
                <input type="radio" name="payment" value="paypal">
                <div class="payment-radio"></div>
                <div class="payment-method-info">
                  <h4>PayPal</h4>
                  <p>Pay with your PayPal account</p>
                </div>
              </label>
              <label class="payment-method" onclick="selectPayment(this, 'apple_pay')">
                <input type="radio" name="payment" value="apple_pay">
                <div class="payment-radio"></div>
                <div class="payment-method-info">
                  <h4>Apple Pay</h4>
                  <p>Quick and secure payment</p>
                </div>
              </label>
            </div>
          </div>

          <div class="checkout-section" id="cardFormSection">
            <h2>Card Details</h2>
            <div class="card-form">
              <div class="form-group">
                <label>Cardholder Name</label>
                <input type="text" class="form-input" id="cardName" placeholder="John Doe">
              </div>
              <div class="form-group">
                <label>Card Number</label>
                <input type="text" class="form-input" id="cardNumber" placeholder="4242 4242 4242 4242" maxlength="19">
              </div>
              <div class="card-row">
                <div class="form-group">
                  <label>Expiry Date</label>
                  <input type="text" class="form-input" id="cardExpiry" placeholder="MM/YY" maxlength="5">
                </div>
                <div class="form-group">
                  <label>CVV</label>
                  <input type="text" class="form-input" id="cardCvv" placeholder="123" maxlength="4">
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Order Summary -->
        <div>
          <div class="cart-summary">
            <h2>Order Summary</h2>
            <div id="checkoutItems"></div>
            <div class="summary-row total" id="checkoutTotal"></div>
            <button class="btn btn-primary btn-block btn-lg mt-4" id="placeOrderBtn" onclick="placeOrder()">
              Place Order & Pay
            </button>
            <p class="text-center mt-2" style="font-size:0.8rem; color:var(--dark-light);">
              Payment is simulated for demo purposes
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Success Modal -->
  <div class="modal-overlay" id="successModal">
    <div class="modal">
      <div class="success-icon">✓</div>
      <h2>Order Placed Successfully!</h2>
      <p id="successMessage">Your order has been confirmed and payment processed.</p>
      <div style="margin-bottom: 16px; padding: 12px; background: var(--light); border-radius: 10px;">
        <strong>Order Reference:</strong><br>
        <span id="orderRef" style="color: var(--primary); font-weight: 700;"></span>
      </div>
      <a href="/orders.html" class="btn btn-primary btn-block">View My Orders</a>
      <a href="/" class="btn btn-secondary btn-block mt-2">Continue Shopping</a>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/chat-widget.js"></script>
  <script>
    let selectedPayment = 'card';

    function selectPayment(el, method) {
      document.querySelectorAll('.payment-method').forEach(m => m.classList.remove('selected'));
      el.classList.add('selected');
      selectedPayment = method;
      document.getElementById('cardFormSection').classList.toggle('hidden', method !== 'card');
    }

    function renderCheckoutSummary() {
      const items = Cart.getAll();
      if (items.length === 0) {
        window.location.href = '/cart.html';
        return;
      }

      const total = Cart.getTotal();
      const itemsHtml = items.map(item => `
        <div class="summary-row">
          <span>${item.name} × ${item.quantity}</span>
          <span>$${(item.price * item.quantity).toFixed(2)}</span>
        </div>
      `).join('');

      document.getElementById('checkoutItems').innerHTML = itemsHtml;
      document.getElementById('checkoutTotal').innerHTML = `
        <span>Total</span>
        <span>$${total.toFixed(2)}</span>
      `;
    }

    function formatCardNumber(input) {
      let value = input.value.replace(/\D/g, '');
      let formatted = value.match(/.{1,4}/g)?.join(' ') || value;
      input.value = formatted;
    }

    function formatExpiry(input) {
      let value = input.value.replace(/\D/g, '');
      if (value.length >= 2) {
        value = value.substring(0, 2) + '/' + value.substring(2);
      }
      input.value = value;
    }

    async function placeOrder() {
      if (!Auth.isLoggedIn()) {
        showToast('Please sign in to place an order', 'error');
        setTimeout(() => { window.location.href = '/login.html'; }, 1000);
        return;
      }

      const items = Cart.getAll();
      if (items.length === 0) {
        showToast('Your cart is empty', 'error');
        return;
      }

      // Validate card if card payment
      if (selectedPayment === 'card') {
        const cardName = document.getElementById('cardName').value.trim();
        const cardNumber = document.getElementById('cardNumber').value.replace(/\s/g, '');
        const cardExpiry = document.getElementById('cardExpiry').value.trim();
        const cardCvv = document.getElementById('cardCvv').value.trim();

        if (!cardName) { showToast('Please enter cardholder name', 'error'); return; }
        if (cardNumber.length < 13) { showToast('Please enter a valid card number', 'error'); return; }
        if (!/^\d{2}\/\d{2}$/.test(cardExpiry)) { showToast('Please enter a valid expiry date', 'error'); return; }
        if (cardCvv.length < 3) { showToast('Please enter a valid CVV', 'error'); return; }
      }

      const btn = document.getElementById('placeOrderBtn');
      btn.disabled = true;
      btn.textContent = 'Processing Payment...';

      try {
        const orderItems = items.map(item => ({
          product_id: item.id,
          quantity: item.quantity
        }));

        const res = await fetch('/api/orders', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${Auth.getToken()}`
          },
          body: JSON.stringify({
            items: orderItems,
            payment_method: selectedPayment,
            cardholder_name: selectedPayment === 'card' ? document.getElementById('cardName').value : ''
          })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        // Clear cart
        Cart.clear();
        updateCartBadge();

        // Show success modal
        document.getElementById('orderRef').textContent = data.order.payment_ref;
        document.getElementById('successModal').classList.add('active');
      } catch (e) {
        showToast(e.message || 'Failed to place order', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Place Order & Pay';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderCheckoutSummary();
      updateCartBadge();

      // Card formatting
      document.getElementById('cardNumber')?.addEventListener('input', function() { formatCardNumber(this); });
      document.getElementById('cardExpiry')?.addEventListener('input', function() { formatExpiry(this); });
      document.getElementById('cardCvv')?.addEventListener('input', function() {
        this.value = this.value.replace(/\D/g, '');
      });
    });
  </script>
</body>
</html>
