<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Login — SubStore</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page" style="background: linear-gradient(135deg, #00B894 0%, #00CEC9 100%);">
    <div class="auth-card">
      <div style="text-align:center; margin-bottom:8px;">
        <div class="logo-icon" style="margin:0 auto 12px; width:56px; height:56px; font-size:1.5rem; background:linear-gradient(135deg,#00B894,#00CEC9);">S</div>
      </div>

      <div id="phoneStep">
        <h1>Support Login</h1>
        <p class="subtitle">Enter your support agent phone number</p>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="phoneInput" class="form-input" placeholder="Your phone number" autofocus>
        </div>
        <button class="btn btn-block btn-lg" style="background:linear-gradient(135deg,#00B894,#00CEC9);color:white;" id="sendOtpBtn" onclick="sendOTP()">
          Send Verification Code
        </button>
        <div class="auth-link mt-4">
          <a href="/">← Back to Store</a>
        </div>
      </div>

      <div id="otpStep" class="hidden">
        <h1>Verify Access</h1>
        <p class="subtitle">Enter the 6-digit code sent to <strong id="otpPhone"></strong></p>
        <div class="otp-inputs">
          <input type="text" class="otp-input" maxlength="1" data-idx="0">
          <input type="text" class="otp-input" maxlength="1" data-idx="1">
          <input type="text" class="otp-input" maxlength="1" data-idx="2">
          <input type="text" class="otp-input" maxlength="1" data-idx="3">
          <input type="text" class="otp-input" maxlength="1" data-idx="4">
          <input type="text" class="otp-input" maxlength="1" data-idx="5">
        </div>
        <button class="btn btn-block btn-lg" style="background:linear-gradient(135deg,#00B894,#00CEC9);color:white;" id="verifyBtn" onclick="verifyOTP()">
          Verify & Access Support
        </button>
        <div class="auth-link mt-4">
          <a href="#" onclick="document.getElementById('phoneStep').classList.remove('hidden'); document.getElementById('otpStep').classList.add('hidden'); return false;">← Change number</a>
        </div>
        <p class="text-center mt-2" style="font-size:0.85rem; color:var(--dark-light);">
          A verification code has been sent to your phone
        </p>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    let currentPhone = '';

    if (Auth.isLoggedIn() && (Auth.isSupport() || Auth.isAdmin())) {
      window.location.href = '/support/';
    }

    async function sendOTP() {
      const phone = document.getElementById('phoneInput').value.trim();
      if (!phone) { showToast('Enter your phone number', 'error'); return; }

      const btn = document.getElementById('sendOtpBtn');
      btn.disabled = true; btn.textContent = 'Sending...';

      try {
        const res = await fetch('/api/auth/send-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        currentPhone = phone;
        document.getElementById('otpPhone').textContent = phone;
        document.getElementById('phoneStep').classList.add('hidden');
        document.getElementById('otpStep').classList.remove('hidden');
        document.querySelector('#otpStep .otp-input').focus();
        showToast(data.message || 'Code sent!', 'success');
      } catch (e) { showToast(e.message, 'error'); }
      finally { btn.disabled = false; btn.textContent = 'Send Verification Code'; }
    }

    async function verifyOTP() {
      const inputs = document.querySelectorAll('#otpStep .otp-input');
      const code = Array.from(inputs).map(i => i.value).join('');
      if (code.length !== 6) { showToast('Enter the full 6-digit code', 'error'); return; }

      const btn = document.getElementById('verifyBtn');
      btn.disabled = true; btn.textContent = 'Verifying...';

      try {
        const res = await fetch('/api/auth/verify-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone: currentPhone, code })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        if (data.user.role !== 'support' && data.user.role !== 'admin') {
          showToast('This phone number does not have support access. Ask an admin to assign the support role.', 'error');
          return;
        }

        Auth.login(data.token, data.user);
        showToast('Support access granted!', 'success');
        setTimeout(() => { window.location.href = '/support/'; }, 500);
      } catch (e) {
        showToast(e.message || 'Invalid code', 'error');
        inputs.forEach(i => { i.value = ''; });
        inputs[0].focus();
      } finally { btn.disabled = false; btn.textContent = 'Verify & Access Support'; }
    }

    document.querySelectorAll('#otpStep .otp-input').forEach((input, idx, arr) => {
      input.addEventListener('input', (e) => {
        if (e.target.value && idx < arr.length - 1) arr[idx + 1].focus();
        if (e.target.value && idx === arr.length - 1) verifyOTP();
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && idx > 0) arr[idx - 1].focus();
      });
      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const paste = (e.clipboardData || window.clipboardData).getData('text').trim();
        if (/^\d{6}$/.test(paste)) {
          arr.forEach((inp, i) => { inp.value = paste[i]; });
          arr[5].focus(); setTimeout(verifyOTP, 100);
        }
      });
    });

    document.getElementById('phoneInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendOTP();
    });
  </script>
</body>
</html>
